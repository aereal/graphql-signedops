---
name: deploy API documents
on:
  push:
    branches:
      - main
jobs:
  deploy-pages:
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm ci
      - id: get_job_html_url
        background: true
        run: |
          gh api "repos/${repo}/actions/runs/${run_id}/attempts/${run_attempt}/jobs" > jobs.json
          cat jobs.json | jq --exit-status -r --arg job_name "$job_name" '.jobs[] | select(.name == $job_name) | .html_url' > job_html_url
          echo "job_html_url=$(cat ./job_html_url)" >> "$GITHUB_OUTPUT"
        env:
          repo: ${{ github.repository }}
          run_id: ${{ github.run_id }}
          run_attempt: ${{ github.run_attempt }}
          job_name: ${{ github.job }}
          GH_TOKEN: ${{ github.token }}
      - run: pnpm build
        background: true
      - wait-all:
      - run: pnpm docs:gen
        env:
          job_html_url: ${{ steps.get_job_html_url.outputs.job_html_url }}
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/
      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
