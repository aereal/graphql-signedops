# generated by octocov init
coverage:
  if: true
  paths:
    - coverage/cobertura-coverage.xml
testExecutionTime:
  if: true
codeToTestRatio:
  code:
    - 'pkgs/**/src/**/*.ts'
    - '!pkgs/**/*.test.ts'
  test:
    - 'pkgs/**/*.test.ts'
diff:
  if: is_pull_request
  path: coverage/cobertura-coverage.xml
  datastores:
    - artifact://${GITHUB_REPOSITORY}
comment:
  if: is_pull_request
  updatePrevious: true
summary:
  if: true
report:
  if: is_default_branch
  datastores:
    - artifact://${GITHUB_REPOSITORY}
